<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3 -2 118 34" role="img" aria-label="Signal 37 — signal from noise">
  <style>
    line { animation: s37bar 3.6s ease-in-out infinite; }
    line:nth-of-type(1) { animation-delay: -2.9s; }
    line:nth-of-type(2) { animation-delay: -1.1s; }
    line:nth-of-type(3) { animation-delay: -2.3s; }
    line:nth-of-type(4) { animation-delay: -0.5s; }
    line:nth-of-type(6) { animation-delay: -1.7s; }
    line:nth-of-type(7) { animation-delay: -0.9s; }
    line:nth-of-type(8) { animation-delay: -2.5s; }
    line:nth-of-type(9) { animation-delay: -1.4s; }
    .sig { animation: s37sig 3s ease-in-out infinite; }
    @keyframes s37bar { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
    @keyframes s37sig { 0%, 100% { opacity: 0.88; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { line { animation: none; opacity: 1; } }
  </style>
  <line x1="0"   y1="30" x2="0"   y2="22" stroke="#8C908E" stroke-width="2"/>
  <line x1="14"  y1="30" x2="14"  y2="18" stroke="#8C908E" stroke-width="2"/>
  <line x1="28"  y1="30" x2="28"  y2="24" stroke="#8C908E" stroke-width="2"/>
  <line x1="42"  y1="30" x2="42"  y2="14" stroke="#8C908E" stroke-width="2"/>
  <line x1="56"  y1="30" x2="56"  y2="2"  stroke="#00A36C" stroke-width="2.6" class="sig"/>
  <line x1="70"  y1="30" x2="70"  y2="17" stroke="#8C908E" stroke-width="2"/>
  <line x1="84"  y1="30" x2="84"  y2="25" stroke="#8C908E" stroke-width="2"/>
  <line x1="98"  y1="30" x2="98"  y2="21" stroke="#8C908E" stroke-width="2"/>
  <line x1="112" y1="30" x2="112" y2="26" stroke="#8C908E" stroke-width="2"/>
</svg>
